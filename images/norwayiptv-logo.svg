<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" role="img" aria-label="NorwayIPTV">
  <title>NorwayIPTV</title>
  <defs>
    <clipPath id="gc">
      <circle cx="60" cy="60" r="54"/>
    </clipPath>
    <filter id="gs" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="rgba(0,0,0,0.30)"/>
    </filter>
  </defs>

  <!-- Globe white base (shows through as the white band) -->
  <circle cx="60" cy="60" r="54" fill="#ffffff" filter="url(#gs)"/>

  <!-- Norwegian Red — top region, above the S-wave -->
  <path clip-path="url(#gc)" fill="#EF2B2D"
    d="M 6,60 C 22,14 98,106 114,60 L 114,6 L 6,6 Z"/>

  <!-- Norwegian Blue — bottom region, below the lower S-wave -->
  <path clip-path="url(#gc)" fill="#002868"
    d="M 6,80 C 22,34 98,126 114,80 L 114,116 L 6,116 Z"/>

  <!-- Thin outer ring for polish -->
  <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>

  <!-- Wordmark -->
  <text y="80"
    font-family="'Plus Jakarta Sans','DM Sans','Helvetica Neue',Arial,sans-serif"
    font-weight="800" font-size="56" letter-spacing="-1">
    <tspan x="134" fill="#ffffff">Norway</tspan><tspan fill="#fd0322">IPTV</tspan>
  </text>
</svg>
